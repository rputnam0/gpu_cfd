name: linear-issue-description-sync

on:
  pull_request:
    paths:
      - AGENTS.md
      - WORKFLOW.md
      - docs/**
      - scripts/symphony/codex_dispatch.py
      - scripts/symphony/linear_api.py
      - scripts/symphony/linear_issue_descriptions.py
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - WORKFLOW.md
      - docs/**
      - scripts/symphony/codex_dispatch.py
      - scripts/symphony/linear_api.py
      - scripts/symphony/linear_issue_descriptions.py
  workflow_dispatch:
    inputs:
      mode:
        description: Audit or sync the live Linear issue descriptions
        required: true
        default: audit
        type: choice
        options:
          - audit
          - sync
      team:
        description: Linear team key
        required: true
        default: PRO
        type: string

permissions:
  contents: read

jobs:
  linear-issue-description-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit live Linear issue descriptions
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'audit') }}
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM: ${{ github.event_name == 'workflow_dispatch' && inputs.team || 'PRO' }}
        run: uv run python scripts/symphony/linear_issue_descriptions.py --mode audit --team "$LINEAR_TEAM"

      - name: Sync live Linear issue descriptions
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'sync') }}
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM: ${{ github.event_name == 'workflow_dispatch' && inputs.team || 'PRO' }}
        run: uv run python scripts/symphony/linear_issue_descriptions.py --mode sync --team "$LINEAR_TEAM"
