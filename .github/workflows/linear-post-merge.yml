name: linear-post-merge

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr:
        description: Pull request number to reconcile
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  linear-post-merge:
    if: ${{ github.event.pull_request.merged == true || inputs.pr != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync merged PR into Linear
        env:
          GH_TOKEN: ${{ github.token }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/symphony/post_merge_bridge.py --repo "$GITHUB_REPOSITORY" --pr "$PR_NUMBER"
